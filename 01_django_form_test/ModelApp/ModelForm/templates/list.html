<a href={% url 'app:list' %}><h3>メンバー一覧</h3></a>
<a href={% url 'app:form' %}><h3>メンバー追加</h3></a>


<table>
    <tr>
        <th>名前</th>
        <th>年齢</th>
        <th>クラス</th>
    </tr>
    
    {% for student in students %}
    <tr>
       <td>
            <a href="{% url 'app:edit' pk=student.pk %}">
                {{ student.name }}
            </a>
        </td>
        <td>{{ student.grade }}</td>
        <td>{{ student.class_id }}</td>
    </tr>
    {% endfor %}
</table>
